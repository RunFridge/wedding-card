<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23f0a8a8'/%3E%3Cg fill='%23fff'%3E%3Crect x='14.5' y='4' width='3' height='4' rx='0.5'/%3E%3Crect x='14.5' y='24' width='3' height='4' rx='0.5'/%3E%3Crect x='4' y='14.5' width='4' height='3' rx='0.5'/%3E%3Crect x='24' y='14.5' width='4' height='3' rx='0.5'/%3E%3Crect x='14.5' y='4' width='3' height='4' rx='0.5' transform='rotate(45 16 16)'/%3E%3Crect x='14.5' y='4' width='3' height='4' rx='0.5' transform='rotate(-45 16 16)'/%3E%3Crect x='14.5' y='24' width='3' height='4' rx='0.5' transform='rotate(45 16 16)'/%3E%3Crect x='14.5' y='24' width='3' height='4' rx='0.5' transform='rotate(-45 16 16)'/%3E%3Ccircle cx='16' cy='16' r='7'/%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='3' fill='%23f0a8a8'/%3E%3C/svg%3E" />
  <title>점검 중 · Under Maintenance</title>
  <style>
    :root {
      --bg: #f5ead3;
      --bg-alt: #e8d9b5;
      --panel: #fff8e7;
      --ink: #4a3219;
      --ink-soft: #6b4a28;
      --accent: #8b6914;
      --border: #a0722a;
      --shadow: rgba(74, 50, 25, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top, var(--bg) 0%, var(--bg-alt) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 8px 24px var(--shadow);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      pointer-events: none;
      opacity: 0.5;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--accent);
    }

    .sub {
      font-size: 14px;
      color: var(--ink-soft);
      margin: 0 0 28px;
    }

    .names {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 24px 0 4px;
    }

    .names .amp {
      margin: 0 10px;
      color: var(--accent);
      font-weight: 400;
    }

    .info {
      margin: 24px 0 8px;
      padding: 16px;
      background: rgba(139, 105, 20, 0.06);
      border-radius: 10px;
      font-size: 14px;
    }

    .info .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 4px 0;
    }

    .info .row + .row {
      border-top: 1px dashed rgba(139, 105, 20, 0.25);
      margin-top: 6px;
      padding-top: 10px;
    }

    .info .label {
      color: var(--ink-soft);
      font-size: 12px;
      flex-shrink: 0;
    }

    .info .value {
      font-weight: 500;
      text-align: right;
      word-break: keep-all;
    }

    .countdown {
      margin: 20px 0 8px;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .countdown strong {
      color: var(--accent);
      font-size: 15px;
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--ink-soft);
      opacity: 0.8;
    }

    @media (max-width: 380px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 20px; }
      .names { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <span class="icon" aria-hidden="true">🔧</span>
    <h1>잠시 점검 중입니다</h1>
    <p class="sub">곧 다시 찾아뵙겠습니다 · We'll be back soon</p>

    <div class="names">
      <span id="groom-name"></span>
      <span class="amp">&amp;</span>
      <span id="bride-name"></span>
    </div>

    <div class="info">
      <div class="row">
        <span class="label">예식일</span>
        <span class="value" id="wedding-date"></span>
      </div>
      <div class="row">
        <span class="label">장소</span>
        <span class="value" id="venue-address"></span>
      </div>
    </div>

    <p class="countdown" id="countdown" aria-live="polite"></p>

    <p class="footer">불편을 드려 죄송합니다.</p>
  </main>

  <script>
    // ─── Edit these values ───
    const WEDDING_DATE = '2030-01-01T11:00:00+09:00';
    const VENUE_ADDRESS = '서울특별시 중구 세종대로 110';
    const GROOM_NAME = '김철수';
    const BRIDE_NAME = '이영희';
    // ─────────────────────────

    (function render() {
      document.getElementById('groom-name').textContent = GROOM_NAME;
      document.getElementById('bride-name').textContent = BRIDE_NAME;
      document.getElementById('venue-address').textContent = VENUE_ADDRESS;

      const target = new Date(WEDDING_DATE);
      const dateEl = document.getElementById('wedding-date');
      dateEl.textContent = target.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
      });

      const countdownEl = document.getElementById('countdown');

      function updateCountdown() {
        const diff = target.getTime() - Date.now();
        if (diff <= 0) {
          countdownEl.textContent = '축하합니다 💍';
          return;
        }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        countdownEl.innerHTML = `예식까지 <strong>D-${days}</strong> · ${hours}시간`;
      }

      updateCountdown();
      setInterval(updateCountdown, 60 * 1000);
    })();
  </script>
</body>
</html>
